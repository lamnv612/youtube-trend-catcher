name: Deploy to Amazon ECS Fargate

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  ECR_REPOSITORY_NAME: ${{ vars.PROJECT }}-webapi-001
  CONTAINER_NAME: ${{ vars.PROJECT }}-${{ github.ref_name }}-webapi-001
  ECS_CLUSTER: ${{ vars.PROJECT }}-ecs-cluster
  ECS_SERVICE: ${{ vars.PROJECT }}-${{ github.ref_name }}-webapi-001
  ECS_TASK_DEFINITION_PATH: .github/.aws/task-definitions-${{ github.ref_name }}.json

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create .env file
        run: |
          echo AWS_REGION=${{ env.AWS_REGION }} >> .env
          echo AWS_ROLE_ARN=${{ env.AWS_ROLE_ARN }} >> .env

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          IMAGE_PATH: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}:${{ github.ref_name }}
        run: |
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH
          echo "IMAGE_PATH=$IMAGE_PATH" >> $GITHUB_ENV

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_PATH }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_PATH }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
